name: 自动更新工作年数

on:
  schedule:
    - cron: '0 0 1 1 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: 计算并更新年数
        run: |
          START=2019
          CURRENT=$(date +%Y)
          YEARS=$((CURRENT - START))
          echo "当前: ${YEARS}+ 年"
          
          # 1. 更新注释标记
          sed -i "s|<!-- YEARS -->[0-9]*+<!-- /YEARS -->|<!-- YEARS -->${YEARS}+<!-- /YEARS -->|g" README.md
          sed -i "s|<!--SVG_YEARS-->[0-9]*%2B<!--/SVG_YEARS-->|<!--SVG_YEARS-->${YEARS}%2B<!--/SVG_YEARS-->|g" README.md
          
          # 2. 更新 shields.io 徽章
          sed -i "s|Experience-[0-9]*%2B_Years|Experience-${YEARS}%2B_Years|g" README.md
          
          git diff --exit-code README.md && echo "无变化" && exit 0
          
      - name: 提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "📅 自动更新年数：$(date +%Y)年 → ${YEARS}+ 年"
          git push
