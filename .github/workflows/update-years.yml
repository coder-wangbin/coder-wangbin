name: 自动更新工作年数

on:
  schedule:
    - cron: '0 0 1 1 *'     # 每年 1 月 1 日
  workflow_dispatch:          # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: 计算并更新年数
        run: |
          START=2019
          CURRENT=$(date +%Y)
          YEARS=$((CURRENT - START))
          echo "当前: ${YEARS}+ 年 (从 ${START} 至今)"
          
          # 更新 README 文本中的年数 (<!-- YEARS -->N+<!-- /YEARS -->)
          sed -i "s|<!-- YEARS -->[0-9]*+<!-- /YEARS -->|<!-- YEARS -->${YEARS}+<!-- /YEARS -->|g" README.md
          
          # 更新 shields.io 徽章中的年数
          sed -i "s|___YEARS___|${YEARS}|g" README.md
          
          # 检查是否有变化
          git diff --exit-code README.md && echo "年数无变化，跳过提交" && exit 0
          
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "📅 自动更新工作年数：$(date +%Y)年"
          git push
